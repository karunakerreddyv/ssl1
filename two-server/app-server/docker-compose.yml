# =============================================================================
# Pravaha Platform - Two-Server App Server Docker Compose
# App Server: All services except PostgreSQL (external database server)
# =============================================================================
#
# Architecture:
#   This server runs: nginx, frontend, backend, superset, ml-service,
#                     celery workers, celery-beat, redis
#   External server:  PostgreSQL (self-hosted, native installation)
#
# Usage:
#   1. Ensure external PostgreSQL is configured and accessible
#   2. Copy .env.example to .env and configure external DB settings
#   3. Run: ./scripts/install.sh --domain your-domain.com
#   OR manually:
#   1. Generate NGINX config: ./scripts/generate-nginx-config.sh
#   2. Validate external DB: ./scripts/validate-external-db.sh
#   3. Run: docker compose up -d
#
# Prerequisites:
#   - External PostgreSQL server configured with:
#     - Database: autoanalytics (platform)
#     - Database: superset (BI)
#     - User with full access to both databases
#     - Network access from this server (pg_hba.conf configured)
#
# =============================================================================

# =============================================================================
# Default Logging Configuration (YAML anchor)
# Prevents disk exhaustion by rotating logs: max 10MB per file, keep 5 files
# =============================================================================
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ===========================================================================
  # NGINX Reverse Proxy
  # Handles SSL termination and routes to services
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: pravaha-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-500}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/pravaha.conf.template:/etc/nginx/templates/pravaha.conf.template:ro
      # Override nginx's built-in default.conf to prevent health check conflicts
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      # For Let's Encrypt ACME challenge (certificate renewal)
      - certbot_www:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      superset:
        condition: service_healthy
    networks:
      - pravaha-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================================================
  # Frontend - React SPA
  # ===========================================================================
  frontend:
    image: ${REGISTRY:-ghcr.io/talentfino/pravaha}/${IMAGE_PREFIX:-}frontend:${IMAGE_TAG:-latest}
    container_name: pravaha-frontend
    restart: unless-stopped
    logging: *default-logging
    environment:
      - BRAND=${BRAND:-pravaha}
      - BRAND_NAME=${BRAND_NAME:-Pravaha}
      - BRAND_CONFIG=${BRAND_CONFIG:-}
    volumes:
      - ./branding:/app/branding:ro
    networks:
      - pravaha-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Backend - Node.js API
  # Connects to EXTERNAL PostgreSQL server
  # ===========================================================================
  backend:
    image: ${REGISTRY:-ghcr.io/talentfino/pravaha}/${IMAGE_PREFIX:-}backend:${IMAGE_TAG:-latest}
    container_name: pravaha-backend
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      # Branding
      - BRAND=${BRAND:-pravaha}
      - BRAND_NAME=${BRAND_NAME:-Pravaha}
      - BRAND_CONFIG=${BRAND_CONFIG:-}
      # License Management
      - LICENSE_PUBLIC_KEY_PATH=${LICENSE_PUBLIC_KEY_PATH:-}
      - LICENSE_SUPPORT_EMAIL=${LICENSE_SUPPORT_EMAIL:-}
      - LICENSE_ENFORCEMENT_MODE=${LICENSE_ENFORCEMENT_MODE:-disabled}
      # Docker-specific overrides (container network URLs)
      - SUPERSET_API_URL=http://superset:8088/insights
      - ML_SERVICE_URL=http://ml-service:8001
      # Audit key paths (mounted files)
      - AUDIT_PRIVATE_KEY=/app/audit-private.pem
      - AUDIT_PUBLIC_KEY=/app/audit-public.pem
      # External database connection (constructed with SSL support)
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${PLATFORM_DB:-autoanalytics}${POSTGRES_SSL_ENABLED:+?sslmode=${POSTGRES_SSL_MODE:-require}}
      - ANALYTICS_DB=${ANALYTICS_DB:-analytics_db}
      # PostgreSQL SSL configuration (optional)
      - PGSSLMODE=${POSTGRES_SSL_MODE:-prefer}
      - PGSSLROOTCERT=${POSTGRES_SSL_CA:-}
      - PGSSLCERT=${POSTGRES_SSL_CERT:-}
      - PGSSLKEY=${POSTGRES_SSL_KEY:-}
      # Schema sync directory for context generation
      - SCHEMA_SYNC_DIR=/app/workflow-configs
      # Redis cache (use DB 0 for backend)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}/0
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - TRUST_PROXY_HOPS=${TRUST_PROXY_HOPS:-1}
      - PLUGINS_DEV_PATH=/app/packages/pluginsdev
      - PLUGIN_STORAGE_PATH=${PLUGIN_STORAGE_PATH:-/app/plugins}
      - SOLUTION_PACK_STORAGE_PATH=${SOLUTION_PACK_STORAGE_PATH:-/app/solution-packs}
      - PACK_DOCS_STORAGE_PATH=${PACK_DOCS_STORAGE_PATH:-/app/pack-docs}
      - SOLUTION_PACK_MAX_UPLOAD_SIZE=${SOLUTION_PACK_MAX_UPLOAD_SIZE:-209715200}
      - SOLUTION_PACK_DATA_GEN_MEMORY_MB=${SOLUTION_PACK_DATA_GEN_MEMORY_MB:-768}
    volumes:
      - uploads:/app/uploads
      - app_logs:/app/logs
      - workflow_configs:/app/workflow-configs
      - ./audit-private.pem:/app/audit-private.pem:ro
      - ./audit-public.pem:/app/audit-public.pem:ro
      # Mount SSL certificates for PostgreSQL connection (if enabled)
      - ./ssl/postgres:/app/ssl/postgres:ro
      - ./branding:/app/branding:ro
      - plugins:/app/plugins
      - solution_packs:/app/solution-packs
      - pack_docs:/app/pack-docs
    depends_on:
      redis:
        condition: service_healthy
      # Note: No postgres dependency - using external database
    networks:
      - pravaha-network
    # Extra hosts for external database resolution (optional)
    extra_hosts:
      - "db-server:${POSTGRES_HOST_IP:-127.0.0.1}"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ===========================================================================
  # Superset - BI & Analytics
  # Connects to EXTERNAL PostgreSQL server
  # ===========================================================================
  superset:
    image: ${REGISTRY:-ghcr.io/talentfino/pravaha}/${IMAGE_PREFIX:-}superset:${IMAGE_TAG:-latest}
    container_name: pravaha-superset
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      # Superset-specific configuration
      - SUPERSET_ENV=production
      # Superset uses different database (superset db in external postgres)
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${SUPERSET_DB:-superset}${POSTGRES_SSL_ENABLED:+?sslmode=${POSTGRES_SSL_MODE:-require}}
      # Platform database for ML analytics dashboards (ml_predictions, ml_models, etc.)
      - PLATFORM_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${PLATFORM_DB:-autoanalytics}${POSTGRES_SSL_ENABLED:+?sslmode=${POSTGRES_SSL_MODE:-require}}
      # Superset uses different Redis DB
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}/1
      # Backend URL for platform integration
      - PLATFORM_API_BASE=http://backend:3000
      - SUPERSET_ADMIN_USERNAME=${SUPERSET_ADMIN_USERNAME:-admin}
      - SUPERSET_ADMIN_EMAIL=${SUPERSET_ADMIN_EMAIL:-admin@pravaha.io}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD:-admin}
      - SUPERSET_WORKERS=${SUPERSET_WORKERS:-4}
      - SUPERSET_APP_ROOT=${SUPERSET_APP_ROOT:-/insights}
      # Branding
      - BRAND=${BRAND:-pravaha}
      - BRAND_NAME=${BRAND_NAME:-Pravaha}
    volumes:
      - superset_home:/app/superset_home
      # Mount SSL certificates for PostgreSQL connection (if enabled)
      - ./ssl/postgres:/app/ssl/postgres:ro
      - ./branding:/app/branding:ro
    depends_on:
      redis:
        condition: service_healthy
      # Note: No postgres dependency - using external database
    networks:
      - pravaha-network
    extra_hosts:
      - "db-server:${POSTGRES_HOST_IP:-127.0.0.1}"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/insights/health"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 180s

  # ===========================================================================
  # ML Service - Python FastAPI API Server
  # Connects to EXTERNAL PostgreSQL server
  # ===========================================================================
  ml-service:
    image: ${REGISTRY:-ghcr.io/talentfino/pravaha}/${IMAGE_PREFIX:-}ml-service:${IMAGE_TAG:-latest}
    container_name: pravaha-ml-service
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      # Branding
      - BRAND=${BRAND:-pravaha}
      - BRAND_NAME=${BRAND_NAME:-Pravaha}
      - BRAND_CONFIG=${BRAND_CONFIG:-}
      # Map JWT_SECRET to JWT_SECRET_KEY (ML service expects JWT_SECRET_KEY)
      - JWT_SECRET_KEY=${JWT_SECRET}
      # ML Service uses different Redis DB for cache
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}/2
      # Celery uses another Redis DB
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379}/3
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379}/3
      # External database connection (constructed with SSL support)
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${PLATFORM_DB:-autoanalytics}${POSTGRES_SSL_ENABLED:+?sslmode=${POSTGRES_SSL_MODE:-require}}
      - ML_STORAGE_PATH=${ML_STORAGE_PATH:-/data/ml-storage}
      - ML_PROFILING_MAX_ROWS=${ML_PROFILING_MAX_ROWS:-1000000}
      - ML_PROFILING_MAX_FILE_SIZE=${ML_PROFILING_MAX_FILE_SIZE:-524288000}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - UVICORN_TIMEOUT_KEEP_ALIVE=${UVICORN_TIMEOUT_KEEP_ALIVE:-65}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
      - UVICORN_LIMIT_MAX_REQUESTS=${UVICORN_LIMIT_MAX_REQUESTS:-50000}
    volumes:
      - ml_models:/app/models
      - ml_logs:/app/logs
      - training_data:/app/training_data
      - ./ssl/postgres:/app/ssl/postgres:ro
      - ml_storage:/data/ml-storage
    depends_on:
      redis:
        condition: service_healthy
      # Note: No postgres dependency - using external database
    networks:
      - pravaha-network
    extra_hosts:
      - "db-server:${POSTGRES_HOST_IP:-127.0.0.1}"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # ===========================================================================
  # Celery Worker - Training Jobs
  # Handles ML model training tasks (long-running)
  # ===========================================================================
  celery-worker-training:
    image: ${REGISTRY:-ghcr.io/talentfino/pravaha}/${IMAGE_PREFIX:-}ml-service:${IMAGE_TAG:-latest}
    container_name: pravaha-celery-training
    restart: unless-stopped
    logging: *default-logging
    stop_signal: SIGTERM
    stop_grace_period: 600s
    command: >
      celery -A src.celery_app:celery_app worker
      --loglevel=info
      -Q training,training.high_priority
      -n training_worker@%h
      --concurrency=${CELERY_TRAINING_CONCURRENCY:-4}
      --prefetch-multiplier=1
    env_file:
      - .env
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}/2
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379}/3
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379}/3
      - CELERY_WORKER_HIJACK_ROOT_LOGGER=false
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${PLATFORM_DB:-autoanalytics}${POSTGRES_SSL_ENABLED:+?sslmode=${POSTGRES_SSL_MODE:-require}}
      - ML_STORAGE_PATH=${ML_STORAGE_PATH:-/data/ml-storage}
    volumes:
      - ml_models:/app/models
      - ml_logs:/app/logs
      - training_data:/app/training_data
      - ./ssl/postgres:/app/ssl/postgres:ro
      - ml_storage:/data/ml-storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pravaha-network
    extra_hosts:
      - "db-server:${POSTGRES_HOST_IP:-127.0.0.1}"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery_app:celery_app inspect ping -d training_worker@$$(hostname) --timeout=10 2>/dev/null || pgrep -f 'celery.*training_worker' > /dev/null"]
      interval: 60s
      timeout: 45s
      retries: 3
      start_period: 90s

  # ===========================================================================
  # Celery Worker - Prediction Jobs
  # Handles ML prediction and batch processing tasks
  # ===========================================================================
  celery-worker-prediction:
    image: ${REGISTRY:-ghcr.io/talentfino/pravaha}/${IMAGE_PREFIX:-}ml-service:${IMAGE_TAG:-latest}
    container_name: pravaha-celery-prediction
    restart: unless-stopped
    logging: *default-logging
    stop_signal: SIGTERM
    stop_grace_period: 120s
    command: >
      celery -A src.celery_app:celery_app worker
      --loglevel=info
      -Q prediction,prediction.high_priority,batch
      -n prediction_worker@%h
      --concurrency=${CELERY_PREDICTION_CONCURRENCY:-4}
      --prefetch-multiplier=1
    env_file:
      - .env
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}/2
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379}/3
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379}/3
      - CELERY_WORKER_HIJACK_ROOT_LOGGER=false
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${PLATFORM_DB:-autoanalytics}${POSTGRES_SSL_ENABLED:+?sslmode=${POSTGRES_SSL_MODE:-require}}
      - ML_STORAGE_PATH=${ML_STORAGE_PATH:-/data/ml-storage}
    volumes:
      - ml_models:/app/models
      - ml_logs:/app/logs
      - training_data:/app/training_data
      - ./ssl/postgres:/app/ssl/postgres:ro
      - ml_storage:/data/ml-storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pravaha-network
    extra_hosts:
      - "db-server:${POSTGRES_HOST_IP:-127.0.0.1}"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery_app:celery_app inspect ping -d prediction_worker@$$(hostname) --timeout=10 2>/dev/null || pgrep -f 'celery.*prediction_worker' > /dev/null"]
      interval: 60s
      timeout: 45s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Celery Worker - Monitoring Jobs
  # Handles monitoring, alerting, analytics, and maintenance tasks
  # ===========================================================================
  celery-worker-monitoring:
    image: ${REGISTRY:-ghcr.io/talentfino/pravaha}/${IMAGE_PREFIX:-}ml-service:${IMAGE_TAG:-latest}
    container_name: pravaha-celery-monitoring
    restart: unless-stopped
    logging: *default-logging
    stop_signal: SIGTERM
    stop_grace_period: 60s
    command: >
      celery -A src.celery_app:celery_app worker
      --loglevel=info
      -Q monitoring,alerting,analytics,maintenance
      -n monitoring_worker@%h
      --concurrency=${CELERY_MONITORING_CONCURRENCY:-2}
      --prefetch-multiplier=1
    env_file:
      - .env
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}/2
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379}/3
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379}/3
      - CELERY_WORKER_HIJACK_ROOT_LOGGER=false
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${PLATFORM_DB:-autoanalytics}${POSTGRES_SSL_ENABLED:+?sslmode=${POSTGRES_SSL_MODE:-require}}
    volumes:
      - ml_models:/app/models
      - ml_logs:/app/logs
      - ./ssl/postgres:/app/ssl/postgres:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pravaha-network
    extra_hosts:
      - "db-server:${POSTGRES_HOST_IP:-127.0.0.1}"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery_app:celery_app inspect ping -d monitoring_worker@$$(hostname) --timeout=10 2>/dev/null || pgrep -f 'celery.*monitoring_worker' > /dev/null"]
      interval: 60s
      timeout: 45s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Celery Beat - Task Scheduler
  # Runs scheduled/periodic tasks (model retraining, cleanup, etc.)
  # ===========================================================================
  celery-beat:
    image: ${REGISTRY:-ghcr.io/talentfino/pravaha}/${IMAGE_PREFIX:-}ml-service:${IMAGE_TAG:-latest}
    container_name: pravaha-celery-beat
    restart: unless-stopped
    logging: *default-logging
    stop_signal: SIGTERM
    stop_grace_period: 15s
    command: >
      bash -c "rm -f /tmp/celerybeat.pid &&
      celery -A src.celery_app:celery_app beat
      --loglevel=info
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule"
    env_file:
      - .env
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${PLATFORM_DB:-autoanalytics}${POSTGRES_SSL_ENABLED:+?sslmode=${POSTGRES_SSL_MODE:-require}}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}/2
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379}/3
      - CELERY_RESULT_BACKEND=${REDIS_URL:-redis://redis:6379}/3
    volumes:
      - ml_logs:/app/logs
      - celery_beat_schedule:/tmp
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pravaha-network
    extra_hosts:
      - "db-server:${POSTGRES_HOST_IP:-127.0.0.1}"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid) 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # Jupyter Notebook Server - Interactive Data Science Environment
  # Provides interactive notebook execution for ML workflows
  # Access at: https://<domain>/notebooks/
  # ===========================================================================
  jupyter:
    image: ${JUPYTER_IMAGE:-quay.io/jupyter/scipy-notebook:2024-10-07}
    container_name: pravaha-jupyter
    restart: unless-stopped
    logging: *default-logging
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=no
      - NB_UID=1000
      - NB_GID=100
    volumes:
      - jupyter_notebooks:/home/jovyan/work
      - jupyter_data:/home/jovyan/data
      - ./notebooks:/home/jovyan/shared:rw
    command: >
      start-notebook.py
      --ServerApp.base_url=/notebooks/
      --ServerApp.allow_origin='https://${DOMAIN}'
      --ServerApp.disable_check_xsrf=False
      --ServerApp.allow_root=True
      --ServerApp.terminado_settings='{"shell_command": ["/bin/bash"]}'
    user: root
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pravaha-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/notebooks/api/status -H 'Authorization: token '$$JUPYTER_TOKEN || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Ollama - Local LLM Inference Engine (Optional)
  # Provides local AI inference for copilot, workflow builder, and data Q&A
  # Set OLLAMA_ENABLED=true in .env to include this service
  # For cloud LLMs (OpenAI/Claude), leave disabled — configure API keys in Admin UI
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: pravaha-ollama
    profiles:
      - llm
    restart: unless-stopped
    logging: *default-logging
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - pravaha-network
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_CPUS:-4.0}"
          memory: ${OLLAMA_MEMORY_LIMIT:-8G}
        reservations:
          cpus: "0.5"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Redis - Cache and Job Queue
  # Stays in Docker on App Server (not external)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: pravaha-redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-1gb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --stop-writes-on-bgsave-error no
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    # Note: To suppress "Memory overcommit" warning, run on host:
    # sudo sysctl vm.overcommit_memory=1 (temporary)
    # echo 'vm.overcommit_memory=1' | sudo tee -a /etc/sysctl.conf (permanent)
    volumes:
      - redis_data:/data
    networks:
      - pravaha-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a ${REDIS_PASSWORD}} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

# =============================================================================
# Networks
# =============================================================================
networks:
  pravaha-network:
    name: pravaha-network
    driver: bridge

# =============================================================================
# Volumes
# Note: No postgres_data volume - PostgreSQL is external
# =============================================================================
volumes:
  redis_data:
    driver: local
  superset_home:
    driver: local
  ml_models:
    driver: local
  ml_storage:
    driver: local
  ml_logs:
    driver: local
  training_data:
    driver: local
  uploads:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local
  certbot_www:
    driver: local
  celery_beat_schedule:
    driver: local
  # Workflow config schemas synced from frontend for context generation
  workflow_configs:
    driver: local
  plugins:
    driver: local
  solution_packs:
    driver: local
  pack_docs:
    driver: local
  jupyter_notebooks:
    driver: local
  jupyter_data:
    driver: local
  ollama_models:
    driver: local
